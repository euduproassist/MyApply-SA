<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Your Documents - MyApply SA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1c64f2;
            --bg-gray: #f9fafb;
            --border-color: #e5e7eb;
            --text-dark: #111827;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-gray); padding: 20px; display: flex; justify-content: center; }

        .container { width: 100%; max-width: 900px; background: white; padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); }

        /* Header & Progress */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .brand { font-weight: 800; font-size: 1.2rem; color: var(--text-dark); }
        .brand span { color: var(--primary-blue); }
        .progress-bar { display: flex; align-items: center; gap: 10px; }
        .step { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.9rem; }
        .step.inactive { background: #e5e7eb; color: var(--text-muted); }

        /* Main Content */
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .sub-text { color: var(--text-muted); margin-bottom: 30px; }

        .upload-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .upload-card { border: 1px solid var(--border-color); padding: 24px; border-radius: 12px; }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .icon-box { background: #eff6ff; color: var(--primary-blue); padding: 12px; border-radius: 8px; font-size: 1.2rem; }
        .upload-btn { display: block; width: 100%; padding: 12px; border: 1px dashed var(--primary-blue); color: var(--primary-blue); background: #fdfdfe; border-radius: 8px; font-weight: 600; cursor: pointer; text-align: center; }

        /* Footer Section */
        .secure-banner { background: #f9fafb; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .save-btn { background: var(--primary-blue); color: white; padding: 14px 28px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .header-top { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <div class="brand"><i class="fas fa-shield-alt"></i> MyApply<span>SA</span></div>
        <div class="progress-bar">
            <div class="step">1</div>
            <div class="step inactive">2</div>
            <div class="step inactive">3</div>
            <div class="step inactive">4</div>
        </div>
    </header>

    <h1>Upload Your Documents</h1>
    <p class="sub-text">These documents help us build your Academic Passport.</p>

    <div class="upload-grid">
        <div class="upload-card">
            <div class="card-header"><div class="icon-box"><i class="fas fa-id-card"></i></div><div><strong>ID Document</strong><br><small>ID book or card</small></div></div>
            <button class="upload-btn"><i class="fas fa-upload"></i> Upload</button>
        </div>
        <div class="upload-card">
            <div class="card-header"><div class="icon-box"><i class="fas fa-graduation-cap"></i></div><div><strong>Matric Results</strong><br><small>NSC statement</small></div></div>
            <button class="upload-btn"><i class="fas fa-upload"></i> Upload</button>
        </div>
        <div class="upload-card">
            <div class="card-header"><div class="icon-box"><i class="fas fa-home"></i></div><div><strong>Proof of Residence</strong><br><small>Utility bill or affidavit</small></div></div>
            <button class="upload-btn"><i class="fas fa-upload"></i> Upload</button>
        </div>
        <div class="upload-card">
            <div class="card-header"><div class="icon-box"><i class="fas fa-file-alt"></i></div><div><strong>Other Documents</strong><br><small>Supporting docs</small></div></div>
            <button class="upload-btn"><i class="fas fa-upload"></i> Upload</button>
        </div>
    </div>

    <div class="secure-banner">
        <div><strong>Your data is secure</strong><br><small>Documents are encrypted and stored safely.</small></div>
        <button class="save-btn">Save & Continue <i class="fas fa-arrow-right"></i></button>
    </div>
</div>

</body>
</html>
